server:
  port: 8080

spring:
  application:
    name: chinese-learning-system

  datasource:
    url: jdbc:postgresql://localhost:5432/chinese_db
    username: admin
    password: 123456
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Ho_Chi_Minh
    open-in-view: false

  flyway:
    enabled: true

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000ms

  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB
      max-request-size: 50MB

logging:
  level:
    root: INFO
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    
app:
  jwt:
    secret: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWYwMTIzNDU2Nzg5YWJjZGVm
    access-token-expiration: 15m
    refresh-token-expiration: 7d
    issuer: chinese-learning-api

cors:
  allowed-origins:
    - http://localhost:3000
    - http://localhost:5173
